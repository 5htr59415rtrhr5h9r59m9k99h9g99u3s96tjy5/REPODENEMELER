<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Düğün Davetiyesi</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4af37;
            --gold-light: #e9d097;
            --gold-dark: #b8941f;
            --bg-dark: #1a1a1c;
            --card-bg: rgba(20, 18, 16, 0.85);
            --text-light: #f0ebe0;
            --text-muted: #c4b998;
        }

        body,
        html {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-light);
            background: var(--bg-dark);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .bg-photo-wrapper {
            position: fixed;
            inset: 0;
            z-index: -2;
        }

        .bg-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.35) blur(8px);
            transform: scale(1.05);
        }

        .bg-overlay {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 0, 0.7) 100%),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.8));
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 30px;
            height: 30px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: floatUp linear forwards;
            opacity: 0;
            will-change: transform, opacity;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0);
                opacity: 0;
            }

            5% {
                opacity: 0.9;
            }

            60% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-110vh) rotate(360deg) scale(1.4);
                opacity: 0;
            }
        }

        .door-stage {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 1s cubic-bezier(0.68, -0.15, 0.27, 1.15);
            pointer-events: all;
        }

        .door-stage.dissolved {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.3);
            filter: blur(10px);
        }

        .door-header-names {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            color: #fff;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8), 0 2px 10px rgba(0, 0, 0, 0.6);
            margin-bottom: clamp(12px, 2vh, 20px);
            letter-spacing: 3px;
            transition: opacity 0.8s;
            text-align: center;
        }

        .door-stage.dissolved .door-header-names {
            opacity: 0;
        }

        .door-frame {
            position: relative;
            width: clamp(200px, 50vw, 260px);
            height: clamp(280px, 55vh, 360px);
            cursor: pointer;
        }

        .door {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(180deg, #5c4a3a 0%, #3a2e24 30%, #5c4a3a 60%, #2b1f16 100%);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6), 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: transform 1.5s cubic-bezier(0.68, -0.25, 0.27, 1.2);
            border: 2px solid rgba(212, 175, 55, 0.4);
        }

        .door-left {
            left: 0;
            border-radius: 8px 0 0 8px;
            transform-origin: left center;
        }

        .door-right {
            right: 0;
            border-radius: 0 8px 8px 0;
            transform-origin: right center;
        }

        .door-panel {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .door-ornament {
            width: 60%;
            height: 40%;
            border: 2px solid rgba(212, 175, 55, 0.5);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .door-left.open {
            transform: rotateY(-120deg) perspective(600px);
        }

        .door-right.open {
            transform: rotateY(120deg) perspective(600px);
        }

        .door-knob {
            position: absolute;
            top: 45%;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            background: radial-gradient(circle at 30% 30%, #f9e4b7, #b8941f);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
            z-index: 2;
        }

        .left-knob {
            right: 8px;
        }

        .right-knob {
            left: 8px;
        }

        .door-hint-box {
            margin-top: clamp(16px, 3vh, 24px);
            padding: clamp(8px, 1.5vh, 12px) clamp(16px, 4vw, 28px);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(212, 175, 55, 0.5);
            font-family: 'Cinzel', serif;
            font-size: clamp(0.7rem, 1.8vw, 0.9rem);
            letter-spacing: 3px;
            color: var(--gold-light);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            cursor: pointer;
            transition: all 0.4s;
            animation: hintBoxPulse 2s infinite;
            text-align: center;
        }

        .door-hint-box:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        @keyframes hintBoxPulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            }

            50% {
                transform: scale(1.02);
                box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            }
        }

        .door-stage.dissolved .door-hint-box {
            opacity: 0;
            transition: opacity 0.5s;
        }

        .invitation-full {
            position: fixed;
            inset: 0;
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.7);
            transition: all 1s cubic-bezier(0.68, -0.15, 0.27, 1.15);
            will-change: transform, opacity;
        }

        .invitation-full.revealed {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }

        .invitation-full.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.7);
            transition: all 0.5s ease-in;
        }

        .luxury-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: clamp(18px, 3vh, 30px) clamp(14px, 4vw, 24px) clamp(14px, 2.5vh, 22px);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            animation: cardGlow 4s ease-in-out infinite;
            transform-origin: center center;
        }

        @keyframes cardGlow {

            0%,
            100% {
                box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(212, 175, 55, 0.06);
            }

            50% {
                box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 60px rgba(212, 175, 55, 0.15);
            }
        }

        .gold-line {
            height: 1.5px;
            background: linear-gradient(90deg, transparent 5%, var(--gold-dark) 20%, var(--gold-light) 50%, var(--gold-dark) 80%, transparent 95%);
            border-radius: 50%;
            margin: 0 auto;
        }

        .gold-line-top {
            width: 70%;
            margin-bottom: clamp(12px, 2vh, 20px);
        }

        .gold-line-bottom {
            width: 70%;
            margin: clamp(12px, 2vh, 18px) auto;
        }

        .couple-photo-frame {
            margin-bottom: clamp(10px, 2vh, 18px);
        }

        .frame-outer {
            display: inline-block;
            border: 2px solid var(--gold);
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            animation: framePulse 5s ease-in-out infinite;
        }

        @keyframes framePulse {

            0%,
            100% {
                box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            }

            50% {
                box-shadow: 0 0 40px rgba(212, 175, 55, 0.55);
            }
        }

        .frame-inner {
            width: clamp(70px, 18vw, 100px);
            height: clamp(70px, 18vw, 100px);
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #1a1a1c;
        }

        .couple-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-header {
            margin-bottom: clamp(8px, 1.5vh, 16px);
        }

        .card-subtitle {
            font-size: clamp(0.55rem, 1.2vw, 0.65rem);
            letter-spacing: clamp(3px, 1vw, 6px);
            color: var(--gold-light);
            margin-bottom: clamp(4px, 1vh, 8px);
            font-weight: 400;
        }

        .card-names {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.4rem, 4.5vw, 2rem);
            color: #fff;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        .ampersand {
            color: var(--gold);
            font-size: clamp(1.2rem, 3.5vw, 1.6rem);
            margin: 0 2px;
            font-style: italic;
        }

        .card-details {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(8px, 2vw, 12px);
            margin-bottom: clamp(10px, 2vh, 18px);
            flex-wrap: wrap;
        }

        .detail-date {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .d-day {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            font-weight: 700;
            line-height: 1;
            color: var(--gold-light);
        }

        .d-my {
            display: flex;
            flex-direction: column;
            font-size: clamp(0.5rem, 1.1vw, 0.6rem);
            letter-spacing: 2px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .detail-separator {
            color: var(--gold);
            font-size: 1rem;
        }

        .detail-location {
            text-align: left;
            font-size: clamp(0.6rem, 1.4vw, 0.7rem);
            line-height: 1.5;
        }

        .detail-location strong {
            display: block;
            letter-spacing: 1px;
            color: #fff;
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
        }

        .detail-time {
            color: var(--gold-light);
            font-size: clamp(0.6rem, 1.3vw, 0.7rem);
        }

        .countdown {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: clamp(10px, 2vh, 18px);
            background: rgba(0, 0, 0, 0.35);
            border-radius: 14px;
            padding: clamp(8px, 1.5vh, 10px) clamp(10px, 3vw, 16px);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .cd-item {
            text-align: center;
            min-width: clamp(30px, 8vw, 40px);
        }

        .cd-item span {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: 700;
            color: var(--gold-light);
            line-height: 1;
        }

        .cd-item small {
            font-size: clamp(0.45rem, 1vw, 0.55rem);
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .cd-dot {
            font-size: 1.2rem;
            color: var(--gold);
            animation: dotBlink 1s infinite;
        }

        @keyframes dotBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .parents {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(6px, 2vw, 10px);
            margin-bottom: clamp(10px, 2vh, 16px);
            font-size: 0.6rem;
            flex-wrap: wrap;
        }

        .parent-group {
            text-align: center;
        }

        .parent-label {
            display: block;
            font-size: clamp(0.4rem, 0.9vw, 0.5rem);
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .parent-names {
            color: var(--text-muted);
            font-size: clamp(0.55rem, 1.2vw, 0.65rem);
            letter-spacing: 1px;
        }

        .parent-ampersand {
            color: var(--gold);
            font-size: 1rem;
            font-family: 'Cinzel', serif;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: clamp(6px, 1vh, 8px);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: clamp(10px, 2vh, 13px) clamp(14px, 3vw, 18px);
            border-radius: 14px;
            font-size: clamp(0.65rem, 1.4vw, 0.72rem);
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.35s;
            border: none;
            font-family: 'Montserrat', sans-serif;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4af37 0%, #c59b2e 50%, #b8861e 100%);
            color: #1a1a1c;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(212, 175, 55, 0.45);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(5px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-icon {
            font-size: 1rem;
        }

        .map-panel {
            position: fixed;
            inset: 0;
            z-index: 95;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
            transition: all 0.6s cubic-bezier(0.68, -0.15, 0.27, 1.15);
            will-change: transform, opacity;
        }

        .map-panel.active {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }

        .map-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: clamp(12px, 2vh, 16px);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: clamp(8px, 1.5vh, 12px);
            transform-origin: center center;
        }

        .map-back-btn {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: var(--gold-light);
            padding: clamp(8px, 1.5vh, 10px) clamp(12px, 3vw, 16px);
            border-radius: 12px;
            font-size: clamp(0.65rem, 1.4vw, 0.75rem);
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'Montserrat', sans-serif;
        }

        .map-back-btn:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold);
            color: #fff;
        }

        .map-iframe {
            width: 100%;
            height: clamp(180px, 35vh, 250px);
            border: 0;
            border-radius: 16px;
        }

        .map-btn {
            width: 100%;
        }
    </style>

        <div class="bg-overlay"></div>

                console.log("Sayfa dolduruluyor (sn3):", veri);

                document.getElementById("doorNames").textContent = veri.gelinAd + " & " + veri.damatAd;
                document.getElementById("doorHint").textContent = veri.doorHint || "🚪 Dokun ve Aç";

                document.getElementById("kartBaslik").textContent = veri.kartBaslik || "BİZ EVLENİYORUZ";
                document.getElementById("gelinAd").textContent = veri.gelinAd;
                document.getElementById("damatAd").textContent = veri.damatAd;

                document.getElementById("gelinAnneBaba").textContent = veri.gelinAnne + " & " + veri.gelinBaba;
                document.getElementById("damatAnneBaba").textContent = veri.damatAnne + " & " + veri.damatBaba;

                document.getElementById("konum").textContent = veri.konum;
                document.getElementById("ilceSehir").textContent = veri.ilce + ", " + veri.sehir;
                document.getElementById("saat").textContent = "🕗 " + veri.saat;

                // Tarih detayları: gün, ay, yıl
                if (veri.tarih) {
                    const parts = veri.tarih.split(" ");
                    if (parts.length >= 3) {
                        document.getElementById("gunSayisi").textContent = parts[0];
                        document.getElementById("ayAdi").textContent = parts[1];
                        document.getElementById("yil").textContent = parts[2];
                    }
                }

                if (veri.haritaIframe) {
                    document.getElementById("haritaIframe").src = veri.haritaIframe;
                }

                // WhatsApp
                const btnLcv = document.getElementById("btnLcv");
                btnLcv.addEventListener("click", function (e) {
                    e.preventDefault();
                    window.open("https://wa.me/" + veri.whatsappNo + "?text=" + encodeURIComponent(veri.whatsappMesaj), "_blank");
                });

                // Navigasyon
                document.getElementById("btnNavigate").addEventListener("click", function () {
                    window.open("https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(veri.konum + ", " + veri.ilce + ", " + veri.sehir), "_blank");
                });

                // Geri sayım
                if (veri.geriSayim) {
                    window.geriSayimHedef = new Date(veri.geriSayim).getTime();
                }
            }

            if (musteriKodu) {
                fetch("/data/sn3/" + musteriKodu + ".json")
                    .then(res => {
                        if (!res.ok) throw new Error("Veri bulunamadı");
                        return res.json();
                    })
                    .then(veri => sayfayiDoldur(veri))
                    .catch(hata => {
                        console.warn("JSON yüklenemedi, varsayılan kullanılıyor:", hata);
                        sayfayiDoldur(varsayilan);
                    });
            } else {
                sayfayiDoldur(varsayilan);
            }
        })();

        // ========== ANA İŞLEVLER ==========
        document.addEventListener('DOMContentLoaded', () => {
            const doorStage = document.getElementById('doorStage');
            const doorLeft = document.getElementById('doorLeft');
            const doorRight = document.getElementById('doorRight');
            const invitationFull = document.getElementById('invitationFull');
            const luxuryCard = document.getElementById('luxuryCard');
            const mapPanel = document.getElementById('mapPanel');
            const mapCard = document.getElementById('mapCard');
            const mapClose = document.getElementById('mapClose');
            const particlesContainer = document.getElementById('particles');
            const music = document.getElementById('bgMusic');
            const btnMap = document.getElementById('btnMap');

            let isRevealed = false;

            // Partiküller
            const particleImages = ['yildiz1.png', 'yildiz2.png', 'yildiz3.png', 'yildiz4.png'];
            function createParticle() {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.backgroundImage = `url('${particleImages[Math.floor(Math.random() * particleImages.length)]}')`;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '-40px';
                const size = Math.random() * 20 + 15;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.animationDuration = (Math.random() * 8 + 6) + 's';
                particlesContainer.appendChild(particle);
                particle.addEventListener('animationend', () => particle.remove());
            }
            setInterval(() => {
                if (particlesContainer.children.length < 35) createParticle();
            }, 700);
            for (let i = 0; i < 12; i++) setTimeout(() => createParticle(), i * 350);

            // Ekrana sığdırma
            function fitElementToScreen(element, containerSelector) {
                const container = document.querySelector(containerSelector);
                if (!element || !container) return;
                element.style.transform = 'none';
                element.style.transformOrigin = 'center center';
                const rect = element.getBoundingClientRect();
                const availableHeight = container.getBoundingClientRect().height * 0.92;
                const availableWidth = container.getBoundingClientRect().width * 0.9;
                let scale = Math.min(availableHeight / rect.height, availableWidth / rect.width, 1);
                scale = Math.max(scale, 0.5);
                element.style.transform = scale < 1 ? `scale(${scale})` : 'none';
            }

            // Kapı açılışı
            function openDoors() {
                if (isRevealed) return;
                isRevealed = true;
                doorLeft.classList.add('open');
                doorRight.classList.add('open');
                setTimeout(() => music.play().catch(() => { }), 1200);
                setTimeout(() => doorStage.classList.add('dissolved'), 900);
                setTimeout(() => {
                    invitationFull.classList.add('revealed');
                    setTimeout(() => fitElementToScreen(luxuryCard, '.invitation-full'), 400);
                }, 1400);
            }

            doorStage.addEventListener('click', openDoors);

            // Harita göster/gizle
            btnMap.addEventListener('click', () => {
                invitationFull.classList.add('hidden');
                invitationFull.classList.remove('revealed');
                mapPanel.classList.add('active');
                setTimeout(() => fitElementToScreen(mapCard, '.map-panel'), 200);
            });

            mapClose.addEventListener('click', () => {
                mapPanel.classList.remove('active');
                invitationFull.classList.remove('hidden');
                invitationFull.classList.add('revealed');
                setTimeout(() => fitElementToScreen(luxuryCard, '.invitation-full'), 200);
            });

            mapPanel.addEventListener('click', (e) => {
                if (e.target === mapPanel) mapClose.click();
            });

            // Geri sayım
            function startCountdown() {
                const target = window.geriSayimHedef || new Date("2027-06-15T19:00:00").getTime();
                const update = () => {
                    const diff = target - Date.now();
                    if (diff <= 0) {
                        document.getElementById('days').innerText = '00';
                        document.getElementById('hours').innerText = '00';
                        document.getElementById('minutes').innerText = '00';
                        return;
                    }
                    document.getElementById('days').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                    document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                    document.getElementById('minutes').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                };
                update();
                setInterval(update, 60000);
            }

            window.addEventListener('resize', () => {
                if (invitationFull.classList.contains('revealed')) fitElementToScreen(luxuryCard, '.invitation-full');
                if (mapPanel.classList.contains('active')) fitElementToScreen(mapCard, '.map-panel');
            });

            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    if (invitationFull.classList.contains('revealed')) fitElementToScreen(luxuryCard, '.invitation-full');
                    if (mapPanel.classList.contains('active')) fitElementToScreen(mapCard, '.map-panel');
                }, 300);
            });

            startCountdown();
        });
    </script>
</body>

</html>
